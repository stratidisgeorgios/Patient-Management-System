services:

  patient-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: ${PATIENT_DB_PASSWORD}
      POSTGRES_DB: patient_db
    ports:
      - "5432:5432"
    networks:
      - patient-network
    volumes:
      - ./patient-service/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # auth-db: (replaced by Keycloak — kept for reference, custom auth-service is in /auth-service)
  # image: postgres:latest
  # environment:
  #   POSTGRES_USER: admin_user
  #   POSTGRES_PASSWORD: password
  #   POSTGRES_DB: auth_db
  # ports:
  #   - "5433:5432"
  # networks:
  #   - patient-network
  # volumes:
  #   - ./auth-service/postgres-data:/var/lib/postgresql
  # healthcheck:
  #   test: ["CMD-SHELL", "pg_isready -U admin_user -d auth_db"]
  #   interval: 5s
  #   timeout: 5s
  #   retries: 5

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    environment:
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 0
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - patient-network

  patient-service:
    build:
      context: .
      dockerfile: patient-service/Dockerfile
    image: patient-service:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patient_db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: ${PATIENT_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    # ports:
    #   - "4000:4000" # documentation
    networks:
      - patient-network
    depends_on:
      patient-db:
        condition: service_healthy
      kafka:
        condition: service_started

  billing-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD}
      POSTGRES_DB: billing_db
    ports:
      - "5434:5432"
    networks:
      - patient-network
    volumes:
      - ./billing-service/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    image: billing-service:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://billing-db:5432/billing_db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: ${BILLING_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TREATMENT_SERVICE_ADDRESS: treatment-service
      TREATMENT_SERVICE_GRPC_PORT: 9002
    # ports:
    #   - "4001:4001" # documentation
    #   - "9001:9001" # documentation (gRPC)
    networks:
      - patient-network
    depends_on:
      billing-db:
        condition: service_healthy
      kafka:
        condition: service_started
      treatment-service:
        condition: service_started

  analytics-db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      POSTGRES_DB: analytics_db
    ports:
      - "5435:5432"
    networks:
      - patient-network
    volumes:
      - ./analytics-service/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  treatment-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: ${TREATMENT_DB_PASSWORD}
      POSTGRES_DB: treatment_db
    ports:
      - "5436:5432"
    networks:
      - patient-network
    volumes:
      - ./treatment-service/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d treatment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  treatment-service:
    build:
      context: .
      dockerfile: treatment-service/Dockerfile
    image: treatment-service:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://treatment-db:5432/treatment_db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: ${TREATMENT_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TREATMENT_SERVICE_ADDRESS: treatment-service
      TREATMENT_SERVICE_GRPC_PORT: 9002
    # ports:
    #   - "4003:4003" # documentation
    #   - "9002:9002" # documentation (gRPC)
    networks:
      - patient-network
    depends_on:
      treatment-db:
        condition: service_healthy
      kafka:
        condition: service_started

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - patient-network

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    image: analytics-service:latest
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://analytics-db:5432/analytics_db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
    # ports:
    #   - "4002:4002" # documentation
    networks:
      - patient-network
    depends_on:
      analytics-db:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started

  # auth-service: (replaced by Keycloak — kept for reference, custom auth-service is in /auth-service)
  # build:
  #   context: .
  #   dockerfile: auth-service/Dockerfile
  # image: auth-service:latest
  # environment:
  #   SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
  #   SPRING_DATASOURCE_USERNAME: admin_user
  #   SPRING_DATASOURCE_PASSWORD: password
  #   SPRING_JPA_HIBERNATE_DDL_AUTO: update
  #   SPRING_SQL_INIT_MODE: always
  #   JWT_SECRET: ${JWT_SECRET}
  # networks:
  #   - patient-network
  # depends_on:
  #   auth-db:
  #     condition: service_healthy

  keycloak-db:
    image: postgres:latest
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_DB: keycloak_db
    networks:
      - patient-network
    volumes:
      - ./keycloak/postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: https://api.patientsystem.me
      KC_HOSTNAME_ADMIN: https://api.patientsystem.me
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    networks:
      - patient-network
    depends_on:
      keycloak-db:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: api-gateway:latest
    environment:
      SERVER_PORT: 4004
    ports:
      - "4004:4004"
    networks:
      - patient-network
    depends_on:
      - patient-service
      - billing-service
      - keycloak

  opensearch-init:
    image: busybox
    privileged: true
    command: sysctl -w vm.max_map_count=262144
    networks:
      - patient-network

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    depends_on:
      - opensearch-init
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - patient-network
    volumes:
      - ./opensearch/data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    image: search-service:latest
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
    networks:
      - patient-network
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_started

  localstack:
    image: localstack/localstack-pro:latest
    ports:
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=ecs,rds,ec2,iam,logs,ecr,lambda,s3,secretsmanager,elasticloadbalancing,elbv2,cloudformation,kafka,route53,acm,ssm,servicediscovery
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - patient-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro
    depends_on:
      - api-gateway
      - keycloak
    networks:
      - patient-network

networks:
  patient-network:
    driver: bridge
