spring.application.name=treatment-service

server.port=4003
grpc.server.port=9002

spring.datasource.url=jdbc:postgresql://localhost:5436/treatment_db
spring.datasource.username=admin_user
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.jpa.properties.hibernate.multiTenancy=SCHEMA
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.patientsystem.treatmentservice.multitenancy.TenantIdentifierResolver

treatment.service.address=localhost
treatment.service.grpc.port=9002
