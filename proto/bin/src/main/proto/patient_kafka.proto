syntax = "proto3";

option java_package = "com.patientsystem.patient.kafka";
option java_multiple_files= true;


message PatientEvent{
    string patient_id = 1;
    string name = 2;
    string email = 3;
    string event_type =4;
    string timestamp=5;
    string date_of_birth = 6;
    string gender = 7;
}

