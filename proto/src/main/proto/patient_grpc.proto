syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.patientsystem.patient.grpc";

service PatientService {
  rpc GetPatient (PatientRequest) returns (PatientResponse);
}

message PatientRequest {
  string patient_id = 1;
}

message PatientResponse {
  string id = 1;
  string name = 2;
  string email = 3;
  string gender = 4;
  string date_of_birth = 5;
  string address = 6;
  string registered_date = 7;
}
