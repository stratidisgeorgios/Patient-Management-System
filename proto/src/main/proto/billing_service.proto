syntax = "proto3";

option java_multiple_files = true;
option java_package = "billing";

service BillingService {
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}


message BillingRequest {
  string patient_id = 1;
  string name = 2;
  string email = 3;
}
message BillingResponse {
  string accountId = 1;
  string status = 2;
}

message ChargeEvent {
    string patientId = 1;
    string treatmentName = 2;
    string category = 3;
    string price = 4;
    string timestamp = 5;
}
